name: Backend CD

on:
  push:
    branches:
      - main

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.BACKEND_IMAGE_NAME }}:dev

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.azure_credentials }}

      - name: Restart backend CA
        run: |
          echo "Restarting backend container app..."
          az containerapp update \
            --name orders-backend-dev-01 \
            --resource-group orders-rg-app-dev-westus2-01 \
            --image ${{ secrets.BACKEND_IMAGE_NAME }}:dev \
            --set-env-vars RESTART_TRIGGER=$(date +%s)

      - name: Restart frontend CA
        run: |
          echo "Restarting frontend container app..."
          az containerapp update \
            --name orders-frontend-dev-01 \
            --resource-group orders-rg-app-dev-westus2-01 \
            --image ${{ secrets.FRONTEND_IMAGE_NAME }}:dev \
            --set-env-vars RESTART_TRIGGER=$(date +%s)        